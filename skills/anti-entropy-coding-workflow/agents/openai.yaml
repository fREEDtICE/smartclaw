interface:
  display_name: "Anti-Entropy Coding Workflow"
  short_description: "Companion workflow for readiness preflight, truth checks, coding loops, and reading guide handoff records"
  default_prompt: "Use $anti-entropy-coding-workflow when the user asks whether a project or scope is ready to start development, whether truth artifacts are sufficient, or when implementation must proceed through source-of-truth checks, scoped coding loops, and review/reset loops. This skill is the companion to $anti-entropy-readiness-guide: read the latest readiness discussion record before repeating bootstrap questions, reuse accepted decisions as bootstrap guidance, and treat unresolved questions as current blockers until they are promoted into authoritative truth artifacts. If the workflow's readiness checks fail, hand the user off to $anti-entropy-readiness-guide for direct guidance on what is weak and which questions matter next. If the missing work is specifically the test-environment bridge from docs-only truth to a first runnable slice, use $anti-entropy-test-environment-bootstrap to author or repair `docs/testing/test-environment.yaml`, bound the first writable slice, and promote the environment honestly. If the manifest is missing and the repository root is known, do a docs-first discovery pass before declaring the project uninitialized: search common locations such as docs/design, docs/e2e, docs/testing, docs/invariants, openapi, proto, specs, api, and contracts, then initialize a repo-local `.anti-entropy/manifest.json` scaffold when discovery finds enough authoritative material. Ask the user for extra paths only after that automatic local discovery is exhausted. Treat manifest bootstrap as distinct from implementation readiness: do not begin normal Step 2 coding until the required test-environment artifact explicitly describes an executable setup, smoke, and targeted verification path for the selected scope. If Step 1 returns `bootstrap_write_authorized`, use the bounded Step 1.5 bridge instead of broad implementation. For medium-risk or high-risk Step 2 work, create a batch contract before code, then use $anti-entropy-evaluator as the independent judge before deciding to continue."
 
