interface:
  display_name: "Anti-Entropy Readiness Guide"
  short_description: "Companion guide for failed readiness checks, missing constraints, and durable handoff"
  default_prompt: "Use $anti-entropy-readiness-guide as the companion to $anti-entropy-coding-workflow when that workflow returns `bootstrap_required`, `blocked_pending_resolution`, `refuse_implementation`, or otherwise fails readiness checks. This skill is a guide, not a neutral brainstormer: inspect the local repository first when available, explain briefly why entropy grows with AI coding agents, state what good looks like, judge what is weak in the current repo, ask 3 to 5 project-specific questions that clarify the key blocked decisions, update the readiness discussion record in the shared anti-entropy format, and name the single best next artifact to create."
